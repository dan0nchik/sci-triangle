# Реестр концептов домена R&D горно-металлургической отрасли (sci-tangle).
# Стабильные concept_id -> preferred label RU/EN + алиасы/аббревиатуры.
# Используется нормализацией (pipeline/extract/normalize.py): точное совпадение
# по label/alias -> concept_id; иначе эмбеддинг-матчинг; иначе auto-концепт.
#
# Поля концепта:
#   concept_id : стабильный c_* идентификатор (не менять!)
#   type       : Material | Process | Equipment | Parameter | Facility
#   label_ru   : предпочтительная метка (рус)
#   label_en   : предпочтительная метка (англ)
#   aliases    : синонимы/аббревиатуры/формы (RU и EN, регистр не важен)
#   class      : для Material — metal|ore|intermediate|reagent|waste|solution|product
#   domain     : для Process — hydro|pyro|обогащение|экология|горное дело|водоочистка
#   unit       : для Parameter — каноническая единица
version: 1
