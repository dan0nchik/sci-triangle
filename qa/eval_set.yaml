      # d000327 ЦМ № 10-2019 (очистка воды известью/флотацией)
      must_mention_docs: ["очистки шахтных", "обессолив", "CM_05_15", "ЦМ № 10-2019"]
      must_contain_numbers: []
      must_have_citations: true
      expect_empty: false

