# sci-tangle — eval-set направления F (QA/Evaluation)
# ---------------------------------------------------------------------------
# Формат кейса:
#   id:            уникальный идентификатор (f01…)
#   query:         запрос на русском (основной)
#   query_en:      англоязычный вариант (опционально; прогоняется отдельным рядом)
#   class:         lookup | review | compare | aggregate | gap | adversarial
#   expected:
#     must_mention_docs:   паттерны-подстроки (регистронезависимо), матчатся по
#                          filename + title процитированных документов.
#                          hit = найден ≥1 паттерн.
#     must_contain_numbers: числа, которые обязаны присутствовать в answer_md
#                          (без эха запроса) или в цитатах (толерантно к ,/.)
#     must_have_citations: bool — ответ обязан содержать ≥1 цитату.
#     expect_empty:        bool — запрос вне корпуса; система обязана честно
#                          сказать «не найдено» и НЕ возвращать цитат.
#
# РЕВИЗИЯ 2 (по реальному корпусу, 403 документа):
#   - паттерны выверены по corpus/documents.jsonl (реальные имена файлов:
#     «Обзор технических решений…», «CM_06_15.pdf», «ЦМ № 09-23.pdf» и т.п.);
#   - числа проверены дословным поиском по corpus/chunks.jsonl — числа из
#     fixture-легенды (1,2 м³/ч; 92,5 %; «сухой остаток 1000») заменены на
#     реально существующие в корпусе (1250–1350 °C в d000097; 1,9/4,5/5,8 м³/ч
#     в d000381; 6 л/час в d000080; 67,1/25,1 мг/л в d000275);
#   - паттерны добавлялись ТОЛЬКО для документов, релевантных запросу по
#     смыслу (проверено по цитируемым фрагментам вручную), а не «под ответ
#     ретривала». Нерелевантные цитаты — баг-репорты для R, не паттерны.
# ---------------------------------------------------------------------------

