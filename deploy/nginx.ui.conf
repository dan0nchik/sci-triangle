# nginx config baked into the UI image (static SPA server).
# The public-facing reverse proxy is deploy/nginx.conf (edge container).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed static assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
