# ---------------------------------------------------------------------------
# sci-tangle — production stack (VPS)
#   neo4j + es + api + ui + nginx (edge reverse proxy)
# All config comes from the repo-root .env (see .env.example).
# Run from repo root:
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
# ---------------------------------------------------------------------------
services:

  neo4j:
    image: neo4j:5-community
    container_name: sci-tangle-neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-knowledge-graph-2026}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "1500m"
      NEO4J_server_memory_pagecache_size: "512M"
    # Bound to localhost so host-side pipeline venvs (loader / precompute /
    # ingest) can reach the store; NOT exposed publicly.
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s
    mem_limit: 2560m
    restart: unless-stopped

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: sci-tangle-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms1500m -Xmx1500m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    # Bound to localhost for host-side loaders/indexers; NOT exposed publicly.
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s
    mem_limit: 2560m
    restart: unless-stopped

  # Query-side embedding sidecar (CPU). Serves Qwen/Qwen3-Embedding-0.6B on the
  # internal compose network at http://embed:1171. The api reaches it via
  # EMBED_LOCAL_URL=http://embed:1171 (set in .env) for the semantic branch of
  # retrieval. Model (~1.2 GB) is fetched from HuggingFace on first start into the
  # hf_cache volume (hence the long healthcheck start_period). Not published.
  embed:
    build:
      context: embed_service
      dockerfile: Dockerfile
    image: sci-tangle-embed:latest
    container_name: sci-tangle-embed
    environment:
      EMBED_DEVICE: "cpu"
      EMBED_MODEL: "${EMBED_MODEL:-Qwen/Qwen3-Embedding-0.6B}"
      EMBED_PREFIX: "qwen"
      EMBED_PORT: "1171"
      EMBED_BATCH: "${EMBED_BATCH:-8}"
      EMBED_MAX_SEQ: "${EMBED_MAX_SEQ:-1024}"
      HF_HOME: "/root/.cache/huggingface"
      OMP_NUM_THREADS: "${EMBED_THREADS:-4}"
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1171/health | grep -q '\"status\": *\"ok\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 600s
    mem_limit: 2g
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: sci-tangle-api:latest
    container_name: sci-tangle-api
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-knowledge-graph-2026}"
      ES_URL: "http://es:9200"
      YANDEX_API_KEY: "${YANDEX_API_KEY:-}"
      YANDEX_FOLDER_ID: "${YANDEX_FOLDER_ID:-}"
      OCR_API_URL: "${OCR_API_URL:-}"
      RU_PROXY: "${RU_PROXY:-}"
      # LLM multi-provider gateway (см. shared/llm_gateway.py)
      LLM_PROVIDER: "${LLM_PROVIDER:-yandex}"
      LLM_MODEL_PLANNER: "${LLM_MODEL_PLANNER:-}"
      LLM_MODEL_SYNTHESIS: "${LLM_MODEL_SYNTHESIS:-}"
      LLM_MODEL_SUMMARIES: "${LLM_MODEL_SUMMARIES:-}"
      LLM_MODEL_EXTRACTION: "${LLM_MODEL_EXTRACTION:-}"
      LLM_FALLBACK: "${LLM_FALLBACK:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      GROQ_PROXY: "${GROQ_PROXY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GIGACHAT_AUTH_KEY: "${GIGACHAT_AUTH_KEY:-}"
      # Эмбеддинг-пространство и загрузки
      EMBEDDING_SPACE: "${EMBEDDING_SPACE:-yandex-256}"
      EMBED_LOCAL_URL: "${EMBED_LOCAL_URL:-}"
      UPLOADS_DIR: "/uploads"
      UPLOADS_DB: "/uploads/uploads.sqlite"
    # Data artifacts are NOT baked into the image (code-only). Mount the
    # repo's corpus/ and graph/ read-only so runtime paths resolve
    # (chunk vectors: /graph/embeddings, analytics: /corpus/documents.jsonl)
    # and loaders can be run via `docker compose exec api`.
    volumes:
      - ../corpus:/corpus:ro
      - ../graph:/graph:ro
      - uploads_data:/uploads
    depends_on:
      neo4j:
        condition: service_healthy
      es:
        condition: service_healthy
    mem_limit: 1g
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ui
      args:
        # Public origin; nginx reverse-proxies /api to the api service.
        VITE_API_URL: "${VITE_API_URL:-}"
    image: sci-tangle-ui:latest
    container_name: sci-tangle-ui
    depends_on:
      - api
    mem_limit: 256m
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: sci-tangle-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ui
      - api
    mem_limit: 128m
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: sci-tangle-caddy
    ports:
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    mem_limit: 128m
    restart: unless-stopped

volumes:
  hf_cache:
  caddy_data:
  caddy_config:
  uploads_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  es_data:
