# ---------------------------------------------------------------------------
# sci-tangle — edge reverse proxy (public entrypoint)
# Mounted at /etc/nginx/nginx.conf in the `nginx` service.
#   /      -> ui   (static SPA)
#   /api   -> api  (FastAPI)
# Features: gzip, per-IP rate limit (~10 rps), 50m body limit.
# HTTPS: terminate here (see deploy/README.md) or in front (caddy/certbot).
# ---------------------------------------------------------------------------
user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    client_max_body_size 50m;

    # ---- gzip ----
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml application/wasm;

    # ---- rate limiting: ~10 requests/sec per client IP, small burst ----
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    # Docker's embedded DNS. Re-resolving the compose service names at runtime
    # (via a variable in proxy_pass) means nginx survives api/ui container
    # recreates (new IPs on every deploy) instead of caching a stale IP -> 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ---- API -> FastAPI ----
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            set                $api_upstream http://api:8000;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ---- everything else -> static UI ----
        location / {
            set                $ui_upstream http://ui:80;
            proxy_pass         $ui_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
