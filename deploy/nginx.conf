# ---------------------------------------------------------------------------
# sci-tangle — edge reverse proxy (public entrypoint)
# Mounted at /etc/nginx/nginx.conf in the `nginx` service.
#   /      -> ui   (static SPA)
#   /api   -> api  (FastAPI)
# Features: gzip, per-IP rate limit (~10 rps), 50m body limit.
# HTTPS: terminate here (see deploy/README.md) or in front (caddy/certbot).
# ---------------------------------------------------------------------------
user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    client_max_body_size 50m;

    # ---- gzip ----
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml application/wasm;

    # ---- rate limiting: ~10 requests/sec per client IP, small burst ----
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    # Upstreams resolve to compose service names.
    upstream ui_upstream  { server ui:80; }
    upstream api_upstream { server api:8000; }

    server {
        listen 80;
        server_name _;

        # ---- API -> FastAPI ----
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ---- everything else -> static UI ----
        location / {
            proxy_pass         http://ui_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
