name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# No repository secrets are required. The stack reads config from .env at
# runtime only; CI runs unit-level checks and image builds without one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend / pipeline / shared
        # Non-blocking style pass: report issues without failing the build,
        # since formatting conventions are still settling across agents.
        run: ruff check backend pipeline shared || true

  backend-tests:
    name: Backend pytest (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run backend tests
        # Integration tests self-skip when Neo4j/ES are unreachable
        # (see backend/tests/conftest.py). No containers in CI.
        working-directory: backend
        run: python -m pytest -q

  pipeline-tests:
    name: Pipeline rules pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pipeline rules deps
        run: pip install -r pipeline/extract/rules/requirements.txt
      - name: Run rules tests
        working-directory: pipeline/extract/rules
        run: python -m pytest -q

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        working-directory: frontend
        run: npm run lint

  docker-build:
    name: Build docker images
    runs-on: ubuntu-latest
    needs: [backend-tests, pipeline-tests, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: false
          tags: sci-tangle-api:ci
      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.ui
          push: false
          tags: sci-tangle-ui:ci
          build-args: |
            VITE_API_URL=
